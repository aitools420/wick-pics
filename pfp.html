<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PFP Ring Generator | WICK.PICS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bungee+Shade&display=swap" rel="stylesheet">
  <link rel="icon" href="./favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(45deg, #000, #0a0a0a, #111);
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      overflow-x: hidden;
      min-height: 100vh;
    }
    .psychedelic-bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background:
        radial-gradient(circle at 20% 30%, rgba(0,255,0,0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255,0,255,0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 90%, rgba(0,255,255,0.1) 0%, transparent 50%);
      animation: psychedelic 10s infinite alternate;
      z-index: -1;
      pointer-events: none;
    }
    @keyframes psychedelic {
      0% { filter: hue-rotate(0deg) blur(0px); }
      100% { filter: hue-rotate(360deg) blur(2px); }
    }
    a.back {
      display: inline-block;
      color: lime;
      text-decoration: none;
      font-size: 0.7rem;
      padding: 20px;
    }
    a.back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="psychedelic-bg"></div>

  <a href="/" class="back">&larr; Back to WICK.PICS</a>

  <section style="padding: 20px 20px 60px; text-align: center;">
    <h2 style="font-family: 'Bungee Shade', cursive; color: lime; margin-bottom: 20px; font-size: clamp(1.5rem, 5vw, 2.5rem);">
      PFP Ring Generator
    </h2>
    <p style="color: #ccc; margin-bottom: 20px; font-size: 0.8rem; line-height: 1.6;">
      Upload your profile picture and we'll add a Green Wick themed ring around it.
    </p>

    <input type="file" id="pfpInput" accept="image/*" style="margin-bottom: 20px; display: block; margin: 0 auto 20px auto; font-family: 'Press Start 2P', cursive; color: lime;">

    <div id="pfpPreview" style="display: none; max-width: 300px; margin: 0 auto 20px auto; position: relative;">
      <canvas id="ringCanvas"></canvas>
    </div>

    <button id="downloadBtn" style="display: none; background: lime; color: #000; border: 4px solid #fff; padding: 12px 24px; font-family: 'Press Start 2P', cursive; cursor: pointer; box-shadow: 8px 8px 0 #ff00ff; font-size: 0.7rem;">
      Download Ringed PFP
    </button>
  </section>

  <script>
    document.getElementById('pfpInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.getElementById('ringCanvas');
          const ctx = canvas.getContext('2d');

          const maxSize = 300;
          let width = img.width;
          let height = img.height;

          if (width > maxSize || height > maxSize) {
            const ratio = Math.min(maxSize / width, maxSize / height);
            width *= ratio;
            height *= ratio;
          }

          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);

          const ringThickness = 10;
          const centerX = width / 2;
          const centerY = height / 2;
          const radius = Math.min(width, height) / 2 - ringThickness / 2;

          ctx.beginPath();
          ctx.arc(centerX, centerY, radius + ringThickness/2 + 3, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(255, 0, 255, 0.5)';
          ctx.lineWidth = 6;
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(centerX, centerY, radius + ringThickness/2, 0, Math.PI * 2);
          ctx.strokeStyle = '#00ff00';
          ctx.lineWidth = ringThickness;
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(centerX, centerY, radius - ringThickness/2, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
          ctx.lineWidth = 4;
          ctx.stroke();

          ctx.fillStyle = '#00ff00';
          for (let i = 0; i < 12; i++) {
            const angle = (i / 12) * Math.PI * 2;
            const x = centerX + Math.cos(angle) * (radius + ringThickness + 5);
            const y = centerY + Math.sin(angle) * (radius + ringThickness + 5);
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fill();
          }

          document.getElementById('pfpPreview').style.display = 'block';
          document.getElementById('downloadBtn').style.display = 'inline-block';
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('downloadBtn').addEventListener('click', function() {
      const canvas = document.getElementById('ringCanvas');
      const link = document.createElement('a');
      link.download = 'green-wick-pfp-ring.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  </script>
</body>
</html>
