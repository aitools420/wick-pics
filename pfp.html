<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PFP Ring Generator | WICK.PICS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bungee+Shade&display=swap" rel="stylesheet">
  <link rel="icon" href="./favicon.ico" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #06080f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }
    a.back {
      display: inline-block;
      color: #888;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 20px 24px;
      transition: color 0.2s;
    }
    a.back:hover { color: #0f0; }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }
    h1 {
      font-family: 'Bungee Shade', cursive;
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: #0f0;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 32px;
    }

    /* Drop zone */
    .dropzone {
      border: 2px dashed rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.02);
    }
    .dropzone:hover, .dropzone.active {
      border-color: rgba(0,255,0,0.4);
      background: rgba(0,255,0,0.03);
    }
    .dropzone-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
    .dropzone-text { color: #888; font-size: 0.85rem; }
    .dropzone-hint { color: #555; font-size: 0.75rem; margin-top: 6px; }

    /* Preview */
    .preview-area {
      display: none;
      text-align: center;
      margin-top: 24px;
    }
    .preview-area.show { display: block; }
    .canvas-wrap {
      display: inline-block;
      box-shadow: 0 0 40px rgba(0,255,0,0.15), 0 0 80px rgba(0,255,0,0.05);
    }
    .canvas-wrap.circle { border-radius: 50%; }
    canvas { display: block; }
    canvas.circle { border-radius: 50%; }

    /* Shape toggle */
    .shape-toggle {
      display: flex;
      gap: 6px;
    }
    .shape-btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: #888;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .shape-btn:hover { border-color: rgba(255,255,255,0.25); color: #ccc; }
    .shape-btn.active { border-color: #0f0; color: #0f0; background: rgba(0,255,0,0.08); }

    /* Controls */
    .controls {
      display: none;
      margin-top: 24px;
      padding: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
    }
    .controls.show { display: block; }
    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .control-row:last-child { margin-bottom: 0; }
    .control-label { color: #999; font-size: 0.8rem; }
    .control-label span { color: #ccc; font-weight: 600; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 180px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.1);
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #0f0;
      cursor: pointer;
    }

    /* Style picker */
    .style-pills {
      display: flex;
      gap: 8px;
    }
    .style-pill {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
    }
    .style-pill:hover { transform: scale(1.15); }
    .style-pill.active { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

    /* Buttons */
    .actions {
      display: none;
      margin-top: 20px;
      gap: 12px;
      justify-content: center;
    }
    .actions.show { display: flex; }
    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #0f0;
      color: #000;
    }
    .btn-primary:hover { background: #3f3; transform: translateY(-1px); }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

  <a href="/" class="back">&larr; wick.pics</a>

  <div class="container">
    <h1>PFP Ring</h1>
    <p class="subtitle">Circle crop + gradient ring, ready for any platform</p>

    <!-- Drop Zone -->
    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">&#x1F5BC;</div>
      <p class="dropzone-text">Drop your image here or click to browse</p>
      <p class="dropzone-hint">PNG, JPG, WebP &mdash; outputs 1024x1024</p>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <!-- Preview -->
    <div class="preview-area" id="previewArea">
      <div class="canvas-wrap">
        <canvas id="canvas" width="400" height="400"></canvas>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls" id="controls">
      <div class="control-row">
        <span class="control-label">Thickness <span id="thickVal">5%</span></span>
        <input type="range" id="thickness" min="2" max="12" value="5" step="0.5">
      </div>
      <div class="control-row">
        <span class="control-label">Zoom <span id="zoomVal">100%</span></span>
        <input type="range" id="zoom" min="80" max="150" value="100">
      </div>
      <div class="control-row">
        <span class="control-label">Shape</span>
        <div class="shape-toggle" id="shapeToggle">
          <button class="shape-btn active" data-shape="circle">Circle</button>
          <button class="shape-btn" data-shape="hexagon">Hexagon</button>
        </div>
      </div>
      <div class="control-row">
        <span class="control-label">Style</span>
        <div class="style-pills" id="stylePills">
          <div class="style-pill active" data-style="wick" style="background: conic-gradient(#0a5c1a, #10b840, #1a4d2e, #22c55e, #0a5c1a);" title="Green Wick"></div>
          <div class="style-pill" data-style="fire" style="background: conic-gradient(#f80, #f00, #ff0, #f80);" title="Fire"></div>
          <div class="style-pill" data-style="ice" style="background: conic-gradient(#0af, #08f, #0ff, #0af);" title="Ice"></div>
          <div class="style-pill" data-style="tang" style="background: conic-gradient(#fc0, #fa0, #ff0, #fc0);" title="Tang Gang"></div>
          <div class="style-pill" data-style="pulse" style="background: conic-gradient(#7B3FE4, #00D4AA, #9945FF, #00FF48, #7B3FE4);" title="PulseChain"></div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions" id="actions">
      <button class="btn btn-secondary" id="resetBtn">Change Image</button>
      <button class="btn btn-primary" id="downloadBtn">Download PFP</button>
    </div>
  </div>

<script>
const SIZE = 1024;        // output resolution
const DISPLAY = 400;      // preview size
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let sourceImg = null;
let currentStyle = 'wick';
let currentShape = 'circle';
let ringPct = 5;
let zoomPct = 100;

const STYLES = {
  wick:   [{stop:0,c:'#0a5c1a'},{stop:0.2,c:'#10b840'},{stop:0.4,c:'#1a4d2e'},{stop:0.6,c:'#22c55e'},{stop:0.8,c:'#15803d'},{stop:1,c:'#0a5c1a'}],
  fire:   [{stop:0,c:'#ff8800'},{stop:0.25,c:'#ff0000'},{stop:0.5,c:'#ffff00'},{stop:0.75,c:'#ff4400'},{stop:1,c:'#ff8800'}],
  ice:    [{stop:0,c:'#00aaff'},{stop:0.25,c:'#0088ff'},{stop:0.5,c:'#00ffff'},{stop:0.75,c:'#44aaff'},{stop:1,c:'#00aaff'}],
  tang:   [{stop:0,c:'#ffcc00'},{stop:0.25,c:'#ffaa00'},{stop:0.5,c:'#ffee44'},{stop:0.75,c:'#ff9900'},{stop:1,c:'#ffcc00'}],
  pulse:  [{stop:0,c:'#7B3FE4'},{stop:0.25,c:'#00D4AA'},{stop:0.5,c:'#9945FF'},{stop:0.75,c:'#00FF48'},{stop:1,c:'#7B3FE4'}],
};

function hexPath(ctx, cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function render(outputSize) {
  if (!sourceImg) return;
  const sz = outputSize || DISPLAY;
  canvas.width = sz;
  canvas.height = sz;
  ctx.clearRect(0, 0, sz, sz);

  const isHex = currentShape === 'hexagon';
  const ringW = sz * (ringPct / 100);
  const center = sz / 2;
  const outerR = sz / 2;
  const innerR = outerR - ringW;

  // Update preview shape classes
  if (!outputSize) {
    const wrap = document.querySelector('.canvas-wrap');
    wrap.classList.toggle('circle', !isHex);
    canvas.classList.toggle('circle', !isHex);
  }

  // Draw gradient ring
  const grad = ctx.createConicGradient(0, center, center);
  STYLES[currentStyle].forEach(s => grad.addColorStop(s.stop, s.c));

  if (isHex) {
    hexPath(ctx, center, center, outerR);
    ctx.save();
    ctx.clip();
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, sz, sz);
    ctx.restore();
    // Cut out inner hex
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    hexPath(ctx, center, center, innerR);
    ctx.fill();
    ctx.restore();
  } else {
    ctx.beginPath();
    ctx.arc(center, center, outerR, 0, Math.PI * 2);
    ctx.arc(center, center, innerR, 0, Math.PI * 2, true);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Clip inner shape for image
  ctx.save();
  if (isHex) {
    hexPath(ctx, center, center, innerR - 1);
  } else {
    ctx.beginPath();
    ctx.arc(center, center, innerR - 1, 0, Math.PI * 2);
  }
  ctx.clip();

  // Draw image centered, cover-fit with zoom
  const scale = zoomPct / 100;
  const imgAspect = sourceImg.width / sourceImg.height;
  const fitD = innerR * 2;
  let drawW, drawH;
  if (imgAspect > 1) {
    drawH = fitD * scale;
    drawW = drawH * imgAspect;
  } else {
    drawW = fitD * scale;
    drawH = drawW / imgAspect;
  }
  ctx.drawImage(sourceImg, center - drawW/2, center - drawH/2, drawW, drawH);
  ctx.restore();
}

// File handling
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('active'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('active'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('active');
  if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      sourceImg = img;
      render();
      dropzone.style.display = 'none';
      document.getElementById('previewArea').classList.add('show');
      document.getElementById('controls').classList.add('show');
      document.getElementById('actions').classList.add('show');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Controls
document.getElementById('thickness').addEventListener('input', e => {
  ringPct = parseFloat(e.target.value);
  document.getElementById('thickVal').textContent = ringPct + '%';
  render();
});
document.getElementById('zoom').addEventListener('input', e => {
  zoomPct = parseInt(e.target.value);
  document.getElementById('zoomVal').textContent = zoomPct + '%';
  render();
});

// Shape toggle
document.getElementById('shapeToggle').addEventListener('click', e => {
  const btn = e.target.closest('.shape-btn');
  if (!btn) return;
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentShape = btn.dataset.shape;
  render();
});

// Style pills
document.getElementById('stylePills').addEventListener('click', e => {
  const pill = e.target.closest('.style-pill');
  if (!pill) return;
  document.querySelectorAll('.style-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  currentStyle = pill.dataset.style;
  render();
});

// Download at full resolution
document.getElementById('downloadBtn').addEventListener('click', () => {
  render(SIZE);
  const link = document.createElement('a');
  link.download = 'wick-pfp.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  render(DISPLAY); // restore preview
});

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
  sourceImg = null;
  fileInput.value = '';
  dropzone.style.display = '';
  document.getElementById('previewArea').classList.remove('show');
  document.getElementById('controls').classList.remove('show');
  document.getElementById('actions').classList.remove('show');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
});
</script>
</body>
</html>
